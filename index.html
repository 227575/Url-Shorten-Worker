<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KV Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --bg-a:       #1a0533;
      --bg-b:       #0d1b4b;
      --bg-c:       #2d0a5e;
      --glass:      rgba(255,255,255,0.07);
      --glass-b:    rgba(255,255,255,0.12);
      --glass-hi:   rgba(255,255,255,0.20);
      --border:     rgba(255,255,255,0.14);
      --border-hi:  rgba(180,140,255,0.55);
      --txt:        #f0eaff;
      --txt-mute:   rgba(240,234,255,0.52);
      --accent:     #c084fc;
      --accent-b:   #818cf8;
      --danger:     #f87171;
      --success:    #34d399;
      --warning:    #fbbf24;
      --radius:     16px;
      --radius-sm:  10px;
      --shadow:     0 8px 40px rgba(0,0,0,0.45);
      --shadow-sm:  0 2px 12px rgba(0,0,0,0.30);
    }
    [data-theme="light"] {
      --bg-a:       #ede9fe;
      --bg-b:       #dbeafe;
      --bg-c:       #fce7f3;
      --glass:      rgba(255,255,255,0.52);
      --glass-b:    rgba(255,255,255,0.70);
      --glass-hi:   rgba(255,255,255,0.88);
      --border:     rgba(139,92,246,0.18);
      --border-hi:  rgba(139,92,246,0.55);
      --txt:        #1e1040;
      --txt-mute:   rgba(30,16,64,0.52);
      --accent:     #7c3aed;
      --accent-b:   #4f46e5;
      --danger:     #dc2626;
      --success:    #059669;
      --warning:    #d97706;
      --shadow:     0 8px 40px rgba(109,40,217,0.15);
      --shadow-sm:  0 2px 12px rgba(109,40,217,0.10);
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      font-family: 'DM Mono', 'Menlo', monospace;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-a) 0%, var(--bg-b) 50%, var(--bg-c) 100%);
      background-attachment: fixed;
      color: var(--txt);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 6rem;
      transition: background 0.4s;
      position: relative;
      overflow-x: hidden;
    }

    /* animated mesh blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.28;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #a855f7, transparent 70%);
      top: -120px; left: -100px;
    }
    body::after {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #818cf8, transparent 70%);
      bottom: -80px; right: -80px;
      animation-direction: alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .wrap {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      position: relative;
      z-index: 1;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .logo {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.9rem;
      font-weight: 500;
      font-style: italic;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent-b));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo span { font-style: normal; font-weight: 300; }
    .header-actions { display: flex; gap: 0.5rem; align-items: center; }

    /* ── Glass Card ─────────────────────────────────────────── */
    .card {
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      transition: box-shadow 0.25s;
    }
    .card:hover { box-shadow: var(--shadow), 0 0 0 1px var(--border-hi); }
    .card-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.1rem;
    }

    /* ── Inputs ─────────────────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.85rem; }
    .field label {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--txt-mute);
    }
    .field input {
      background: var(--glass-b);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--txt);
      font-family: inherit;
      font-size: 0.88rem;
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      width: 100%;
    }
    .field input::placeholder { color: var(--txt-mute); }
    .field input:focus {
      border-color: var(--border-hi);
      box-shadow: 0 0 0 3px rgba(192,132,252,0.18);
      background: var(--glass-hi);
    }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 0.55rem 1.1rem;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }
    .btn:hover::after { background: rgba(255,255,255,0.10); }
    .btn:hover { transform: translateY(-1px) scale(1.03); box-shadow: 0 4px 18px rgba(0,0,0,0.25); }
    .btn:active { transform: scale(0.97); }

    .btn-primary   { background: linear-gradient(135deg, var(--accent), var(--accent-b)); color: #fff; box-shadow: 0 2px 10px rgba(124,58,237,0.35); }
    .btn-danger    { background: rgba(248,113,113,0.18); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
    .btn-ghost     { background: var(--glass-b); color: var(--txt); border: 1px solid var(--border); }
    .btn-success   { background: rgba(52,211,153,0.15); color: var(--success); border: 1px solid rgba(52,211,153,0.3); }
    .btn-sm        { padding: 0.3rem 0.65rem; font-size: 0.75rem; }
    .btn:disabled  { opacity: 0.45; pointer-events: none; }

    /* icon btn */
    .btn-icon {
      background: var(--glass-b);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--txt);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      padding: 0.4rem;
      transition: transform 0.15s, background 0.15s;
    }
    .btn-icon:hover { background: var(--glass-hi); transform: scale(1.08); }

    /* ── Search bar ─────────────────────────────────────────── */
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
    }
    .search-wrap input {
      flex: 1;
      background: var(--glass-b);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--txt);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.5rem 0.8rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input::placeholder { color: var(--txt-mute); }
    .search-wrap input:focus {
      border-color: var(--border-hi);
      box-shadow: 0 0 0 3px rgba(192,132,252,0.15);
    }

    /* ── KV List ────────────────────────────────────────────── */
    #kvList { display: flex; flex-direction: column; gap: 0.65rem; }
    .kv-item {
      background: var(--glass-b);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.85rem 1rem;
      transition: border-color 0.2s, background 0.2s;
      animation: slideIn 0.25s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .kv-item:hover { border-color: var(--border-hi); background: var(--glass-hi); }
    .kv-key {
      font-weight: 500;
      font-size: 0.92rem;
      color: var(--accent);
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .kv-key .badge {
      font-size: 0.62rem;
      background: rgba(192,132,252,0.18);
      color: var(--accent);
      border-radius: 4px;
      padding: 0.1rem 0.45rem;
      letter-spacing: 0.06em;
    }
    .kv-value {
      font-size: 0.8rem;
      color: var(--txt-mute);
      word-break: break-all;
      line-height: 1.55;
      cursor: pointer;
    }
    .kv-value .toggle-link {
      color: var(--accent-b);
      margin-left: 0.4rem;
      font-size: 0.72rem;
      text-decoration: underline;
      cursor: pointer;
      user-select: none;
    }
    .kv-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.65rem;
      flex-wrap: wrap;
    }

    /* ── Empty state ────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--txt-mute);
    }
    .empty-state svg { opacity: 0.3; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.82rem; }

    /* ── Toast ──────────────────────────────────────────────── */
    #toastContainer {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 9999;
      pointer-events: none;
    }
    .toast {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 12px;
      color: #fff;
      font-size: 0.82rem;
      padding: 0.75rem 1.1rem;
      pointer-events: auto;
      min-width: 200px;
      max-width: 340px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: toastIn 0.3s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(40px) scale(0.92); }
      to   { opacity: 1; transform: none; }
    }
    .toast.out { animation: toastOut 0.25s ease forwards; }
    @keyframes toastOut {
      to { opacity: 0; transform: translateX(40px); }
    }
    .toast.success { background: rgba(5,150,105,0.88); border: 1px solid rgba(52,211,153,0.4); }
    .toast.error   { background: rgba(185,28,28,0.88);  border: 1px solid rgba(248,113,113,0.4); }
    .toast.info    { background: rgba(79,70,229,0.88);  border: 1px solid rgba(129,140,248,0.4); }

    /* ── Loading spinner ────────────────────────────────────── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ────────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--txt-mute);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0.25rem 0 0.75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      text-align: center;
      padding: 0.75rem;
      font-size: 0.72rem;
      color: var(--txt-mute);
      background: linear-gradient(to top, rgba(0,0,0,0.18), transparent);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      z-index: 10;
    }
    footer a { color: var(--txt-mute); text-decoration: none; display: inline-flex; align-items: center; gap: 0.35rem; }
    footer a:hover { color: var(--accent); }

    /* ── Count badge ────────────────────────────────────────── */
    .count-badge {
      background: rgba(192,132,252,0.18);
      border: 1px solid rgba(192,132,252,0.3);
      border-radius: 20px;
      color: var(--accent);
      font-size: 0.72rem;
      padding: 0.1rem 0.55rem;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      .btn-row { gap: 0.4rem; }
      .btn { padding: 0.5rem 0.85rem; font-size: 0.78rem; }
    }

    /* ── Dark mode auto ─────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) {
        /* already dark by default */
      }
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo">KV <span>Studio</span></div>
    <div class="header-actions">
      <!-- theme toggle -->
      <button class="btn-icon" id="themeBtn" title="Toggle theme" onclick="toggleTheme()">
        <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Control Panel -->
  <div class="card">
    <div class="card-title">Operations</div>

    <div class="field">
      <label>URL / Value</label>
      <input type="text" id="longURL" placeholder="https://example.com/ or any value" />
    </div>

    <div class="field">
      <label>Key (optional for add, required for del/qry)</label>
      <input type="text" id="keyPhrase" placeholder="custom-key or leave blank" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" value="__PASSWORD__" placeholder="required" />
    </div>

    <div class="divider">actions</div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="cmdAdd()" id="btnAdd">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
      <button class="btn btn-danger" onclick="cmdDel()" id="btnDel">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        Delete
      </button>
      <button class="btn btn-ghost" onclick="cmdQry()" id="btnQry">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Query
      </button>
      <button class="btn btn-success" onclick="cmdQryAll()" id="btnQryAll">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Load All
      </button>
    </div>
  </div>

  <!-- KV List -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <div class="card-title" style="margin-bottom:0;">
        KV Records
        <span class="count-badge" id="countBadge">0</span>
      </div>
      <button class="btn btn-icon" onclick="cmdQryAll()" title="Refresh">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
    </div>

    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--txt-mute);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search keys or values…" oninput="renderList()" />
    </div>

    <div id="kvList">
      <div class="empty-state">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        <p>Click <strong>Load All</strong> to fetch KV records</p>
      </div>
    </div>
  </div>

</div>

<!-- Footer -->
<footer>
  <a href="https://github.com/227575/Url-Shorten-Worker" target="_blank" rel="noopener">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
    Pastebin
  </a>
  <span>·</span>
  <span id="year"></span>
</footer>

<!-- Toast container -->
<div id="toastContainer"></div>

<script>
  /* ── Config ─────────────────────────────────────────────── */
  const API = '/';
  let kvData = [];   // full dataset from qryall

  /* ── Year ───────────────────────────────────────────────── */
  document.getElementById('year').textContent = '© ' + new Date().getFullYear();

  /* ── Theme ──────────────────────────────────────────────── */
  const html = document.documentElement;
  const savedTheme = localStorage.getItem('kvs-theme');
  if (savedTheme) html.setAttribute('data-theme', savedTheme);

  function toggleTheme() {
    const t = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', t);
    localStorage.setItem('kvs-theme', t);
  }

  /* ── Toast ──────────────────────────────────────────────── */
  function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    const icons = {
      success: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
      error:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
      info:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    };
    el.innerHTML = (icons[type] || icons.info) + `<span>${msg}</span>`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => {
      el.classList.add('out');
      setTimeout(() => el.remove(), 300);
    }, 3200);
  }

  /* ── Loading state ──────────────────────────────────────── */
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.disabled = loading;
    if (loading) {
      btn._orig = btn.innerHTML;
      btn.innerHTML = `<span class="spinner"></span> Loading`;
    } else {
      btn.innerHTML = btn._orig || btn.innerHTML;
    }
  }

  /* ── API call ───────────────────────────────────────────── */
  async function apiCall(body, loadingBtnId) {
    if (loadingBtnId) setLoading(loadingBtnId, true);
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      return data;
    } catch (e) {
      toast('Network error: ' + e.message, 'error');
      return null;
    } finally {
      if (loadingBtnId) setLoading(loadingBtnId, false);
    }
  }

  /* ── Helpers ────────────────────────────────────────────── */
  function pw()  { return document.getElementById('passwordInput').value.trim(); }
  function url() { return document.getElementById('longURL').value.trim(); }
  function key() { return document.getElementById('keyPhrase').value.trim(); }

  /* ── CMD: add ───────────────────────────────────────────── */
  async function cmdAdd() {
    if (!url()) { toast('Please enter a URL / value', 'error'); return; }
    if (!pw())  { toast('Password is required', 'error'); return; }
    const data = await apiCall({ cmd: 'add', url: url(), key: key(), password: pw() }, 'btnAdd');
    if (!data) return;
    if (data.status === 200) {
      toast(`Added! Key: ${data.key}`, 'success');
      document.getElementById('keyPhrase').value = '';
      document.getElementById('longURL').value = '';
      cmdQryAll();
    } else {
      toast(data.error || 'Add failed', 'error');
    }
  }

  /* ── CMD: del ───────────────────────────────────────────── */
  async function cmdDel(specificKey) {
    const k = specificKey || key();
    if (!k)  { toast('Please enter a Key to delete', 'error'); return; }
    if (!pw()) { toast('Password is required', 'error'); return; }
    const data = await apiCall({ cmd: 'del', url: '', key: k, password: pw() }, specificKey ? null : 'btnDel');
    if (!data) return;
    if (data.status === 200) {
      toast(`Deleted: ${k}`, 'success');
      cmdQryAll();
    } else {
      toast(data.error || 'Delete failed', 'error');
    }
  }

  /* ── CMD: qry ───────────────────────────────────────────── */
  async function cmdQry() {
    if (!key()) { toast('Please enter a Key to query', 'error'); return; }
    if (!pw())  { toast('Password is required', 'error'); return; }
    const data = await apiCall({ cmd: 'qry', url: '', key: key(), password: pw() }, 'btnQry');
    if (!data) return;
    if (data.status === 200) {
      toast(`Key: ${data.key} → ${data.url.slice(0,60)}${data.url.length>60?'…':''}`, 'info');
    } else {
      toast(data.error || 'Query failed', 'error');
    }
  }

  /* ── CMD: qryall ────────────────────────────────────────── */
  async function cmdQryAll() {
    if (!pw()) { toast('Password is required', 'error'); return; }
    const data = await apiCall({ cmd: 'qryall', url: '', key: '', password: pw() }, 'btnQryAll');
    if (!data) return;
    if (data.status === 200) {
      kvData = data.kvlist || [];
      renderList();
      toast(`Loaded ${kvData.length} records`, 'success');
    } else {
      toast(data.error || 'Load failed', 'error');
    }
  }

  /* ── Render KV list ─────────────────────────────────────── */
  function renderList() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    const filtered = kvData.filter(item =>
      item.key.toLowerCase().includes(q) || (item.value || '').toLowerCase().includes(q)
    );

    document.getElementById('countBadge').textContent = filtered.length;
    const list = document.getElementById('kvList');

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        <p>${kvData.length === 0 ? 'Click <strong>Load All</strong> to fetch KV records' : 'No results match your search'}</p>
      </div>`;
      return;
    }

    list.innerHTML = '';
    filtered.forEach((item, i) => {
      const val    = item.value || '';
      const SHORT  = 80;
      const needFold = val.length > SHORT;
      const foldId = `fold-${i}`;
      const btnId  = `foldBtn-${i}`;

      const valHtml = needFold
        ? `<span id="${foldId}" class="kv-value">
            <span class="fold-short">${escHtml(val.slice(0, SHORT))}…<span class="toggle-link" onclick="toggleFold('${foldId}','${btnId}')" id="${btnId}">[expand]</span></span>
            <span class="fold-full" style="display:none">${escHtml(val)}<span class="toggle-link" onclick="toggleFold('${foldId}','${btnId}')">[collapse]</span></span>
           </span>`
        : `<span class="kv-value">${escHtml(val)}</span>`;

      const el = document.createElement('div');
      el.className = 'kv-item';
      el.style.animationDelay = (i * 0.03) + 's';
      el.innerHTML = `
        <div class="kv-key">
          <span>${escHtml(item.key)}</span>
          <span class="badge">key</span>
        </div>
        ${valHtml}
        <div class="kv-actions">
          <button class="btn btn-danger btn-sm" onclick="cmdDel('${escAttr(item.key)}')">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            Delete
          </button>
          <button class="btn btn-ghost btn-sm" onclick="copyValue('${escAttr(val)}')">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="btn btn-ghost btn-sm" onclick="fillEdit('${escAttr(item.key)}','${escAttr(val)}')">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
        </div>`;
      list.appendChild(el);
    });
  }

  /* ── Fold toggle ────────────────────────────────────────── */
  function toggleFold(foldId) {
    const el = document.getElementById(foldId);
    if (!el) return;
    const s = el.querySelector('.fold-short');
    const f = el.querySelector('.fold-full');
    const isCollapsed = f.style.display === 'none';
    s.style.display = isCollapsed ? 'none' : '';
    f.style.display = isCollapsed ? '' : 'none';
  }

  /* ── Copy value ─────────────────────────────────────────── */
  async function copyValue(val) {
    try {
      await navigator.clipboard.writeText(val);
      toast('Copied to clipboard!', 'success');
    } catch {
      toast('Copy failed', 'error');
    }
  }

  /* ── Fill edit ──────────────────────────────────────────── */
  function fillEdit(k, v) {
    document.getElementById('keyPhrase').value = k;
    document.getElementById('longURL').value   = v;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    toast(`Loaded "${k}" for editing`, 'info');
  }

  /* ── Escape helpers ─────────────────────────────────────── */
  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function escAttr(s) {
    return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  }
</script>
</body>
</html>
