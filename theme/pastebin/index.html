<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta http-equiv="content-type" content="txt/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RoyalPaste - Premium Bin</title>
  
  <!-- Bootstrap & Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    /* ========== Royal Mac Design Tokens (紫金风格) ========== */
    :root {
      /* Light Theme */
      --bg-color: #f7f5fa;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(106, 27, 154, 0.15);
      --card-shadow: 0 10px 30px -10px rgba(106, 27, 154, 0.1);
      --text-main: #2c1a3d;
      --text-muted: #6b5c7a;
      --input-bg: rgba(255, 255, 255, 0.9);
      --input-border: rgba(106, 27, 154, 0.2);
      --input-text: #2c1a3d;
      --gold-accent: linear-gradient(135deg, #b8860b, #d4af37);
      --purple-accent: #6a1b9a;
      --mac-header-bg: #f0ebf5;
      --list-item-bg: rgba(255, 255, 255, 0.6);
    }

    [data-theme="dark"] {
      /* Dark Theme */
      --bg-color: #12091c;
      --card-bg: rgba(35, 20, 50, 0.7);
      --card-border: rgba(212, 175, 55, 0.2);
      --card-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.6);
      --text-main: #f0e6fa;
      --text-muted: #b0a3c2;
      --input-bg: rgba(15, 8, 25, 0.6);
      --input-border: rgba(212, 175, 55, 0.3);
      --input-text: #e6e0f0;
      --gold-accent: linear-gradient(135deg, #d4af37, #f9df9f);
      --purple-accent: #8e24aa;
      --mac-header-bg: rgba(25, 15, 35, 0.9);
      --list-item-bg: rgba(20, 10, 30, 0.5);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: background-color 0.4s ease, color 0.4s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Subtle background glow effect */
    body::before {
      content: '';
      position: fixed;
      top: -10%; left: -10%; width: 120%; height: 120%;
      background: radial-gradient(circle at 50% 30%, rgba(106, 27, 154, 0.08) 0%, transparent 60%),
                  radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
      z-index: -1;
      pointer-events: none;
    }

    /* ========== Mac Window Card Style ========== */
    .mac-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .mac-card-header {
      background: var(--mac-header-bg);
      border-bottom: 1px solid var(--card-border);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-main);
    }
    /* Mac Traffic Lights */
    .mac-dots {
      display: flex;
      gap: 6px;
      margin-right: 15px;
    }
    .mac-dots span {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: inline-block;
    }
    .mac-dots span:nth-child(1) { background-color: #ff5f56; }
    .mac-dots span:nth-child(2) { background-color: #ffbd2e; }
    .mac-dots span:nth-child(3) { background-color: #27c93f; }

    /* ========== Input & Textarea Adjustments ========== */
    .form-control, .input-group-text, .form-control[readonly] {
      background-color: var(--input-bg) !important;
      border: 1px solid var(--input-border);
      color: var(--input-text) !important;
      transition: all 0.3s;
    }
    .form-control:focus {
      border-color: #d4af37 !important;
      box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25) !important;
    }
    .input-group-text { color: var(--text-muted) !important; font-weight: 500; border-right: none;}
    .input-group > .form-control { border-left: 1px solid var(--input-border); }
    
    /* ========== Golden Buttons ========== */
    .btn-gold {
      background: var(--gold-accent);
      color: #1a0b2e !important;
      border: none;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4); }
    
    .btn-purple {
      background-color: var(--purple-accent);
      color: white;
      border: none;
    }
    .btn-purple:hover { background-color: #5e1687; color: white;}

    /* ========== Pastebin List Textarea Auto-Hide (核心: 文本折叠限制) ========== */
    #urlList .list-group-item {
      background: var(--list-item-bg) !important;
      border: 1px solid var(--card-border) !important;
      border-radius: 8px !important;
      margin-bottom: 1rem;
      backdrop-filter: blur(5px);
    }
    /* 限制记事本回显文本的高度，超出显示滚动条，用户可自由拉伸 */
    #urlList textarea.form-control {
      max-height: 350px;
      min-height: 80px;
      height: 120px; /* 默认折叠高度 */
      resize: vertical; /* 允许垂直拉伸展开 */
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      margin-top: 10px;
      border: 1px solid var(--card-border) !important;
      border-radius: 6px !important;
    }
    
    #urlList canvas { background: #fff; padding: 5px; border-radius: 5px; margin-top: 10px; }

    /* ========== Theme Switch & Misc ========== */
    .theme-switch {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: var(--card-bg); border: 1px solid var(--card-border);
      color: var(--gold-accent); border-radius: 50%;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 1000;
    }
    .logo-svg { width: 36px; height: 36px; margin-right: 12px; }
    
    footer { padding: 2rem 0; text-align: center; margin-top: auto;}
    footer a { color: var(--text-muted); text-decoration: none; font-weight: 500; font-family: monospace;}
    footer a:hover { color: #d4af37; }
    
    /* Modal Theme */
    .modal-content { background: var(--bg-color); color: var(--text-main); border: 1px solid var(--card-border); }
    .modal-header { border-bottom: 1px solid var(--card-border); }
    .modal-footer { border-top: 1px solid var(--card-border); }
  </style>
</head>

<body>

  <!-- Theme Toggle -->
  <button class="theme-switch shadow-sm" onclick="toggleTheme()" title="Toggle Theme">
    <i class="bi bi-moon-stars-fill" id="theme-icon" style="color: #d4af37;"></i>
  </button>

  <div class="container py-4">
    <!-- Header: Logo & Title -->
    <div class="d-flex align-items-center justify-content-center mb-5">
      <!-- Premium SVG Logo -->
      <svg class="logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 4V3C8 2.44772 8.44772 2 9 2H15C15.5523 2 16 2.44772 16 3V4" stroke="url(#gold-grad)" stroke-width="2" stroke-linecap="round"/>
        <path d="M4 6C4 4.89543 4.89543 4 6 4H18C19.1046 4 20 4.89543 20 6V20C20 21.1046 19.1046 22 18 22H6C4.89543 22 4 21.1046 4 20V6Z" stroke="url(#gold-grad)" stroke-width="2"/>
        <path d="M9 10H15M9 14H15M9 18H12" stroke="#8e24aa" stroke-width="2" stroke-linecap="round"/>
        <defs>
          <linearGradient id="gold-grad" x1="4" y1="2" x2="20" y2="22" gradientUnits="userSpaceOnUse">
            <stop stop-color="#d4af37"/>
            <stop offset="1" stop-color="#f9df9f"/>
          </linearGradient>
        </defs>
      </svg>
      <h2 class="fw-bold mb-0" style="background: var(--gold-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">RoyalPaste</h2>
    </div>

    <!-- Symmetrical Layout: Left (Edit) & Right (Storage) -->
    <div class="row g-4">
      
      <!-- Left Column: Operations -->
      <div class="col-lg-6">
        
        <!-- Search Card -->
        <div class="mac-card">
          <div class="mac-card-header">
            <div class="mac-dots"><span></span><span></span><span></span></div>
            Search Snippet (Load 1 KV)
          </div>
          <div class="card-body p-4">
            <label class="form-label small text-muted">Retrieve specific key</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control" placeholder="Enter snippet key..." id="keyForQuery">
              <button class="btn btn-purple text-white px-4" type="button" onclick="query1KV()" id="qryBtn">Load</button>
            </div>
          </div>
        </div>

        <!-- Editor Card -->
        <div class="mac-card">
          <div class="mac-card-header">
            <div class="mac-dots"><span></span><span></span><span></span></div>
            New Paste
          </div>
          <div class="card-body p-4">
            
            <label class="form-label small text-muted">Content</label>
            <div class="input-group mb-4 shadow-sm">
              <textarea class="form-control font-monospace" rows="8" id="longURL" placeholder="Paste your text or code here..." oninput="loadUrlList()" style="resize: vertical;"></textarea>
            </div>

            <label class="form-label small text-muted">Settings</label>
            <div class="input-group mb-3 shadow-sm">
              <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
              <input type="text" class="form-control" id="keyPhrase" placeholder="Custom Alias / Key (Optional)">
            </div>

            <div class="input-group mb-4 shadow-sm">
              <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
              <input class="form-control" type="password" value="__PASSWORD__" readonly="true" id="passwordText">
              <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()"><i class="bi bi-eye"></i></button>
            </div>

            <div class="d-grid mt-2">
              <button class="btn btn-gold btn-lg text-uppercase tracking-wide" type="button" onclick="shorturl()" id="addBtn">
                <i class="bi bi-cloud-arrow-up-fill me-2"></i> Save Paste
              </button>
            </div>

          </div>
        </div>
        
      </div> <!-- End Left Column -->

      <!-- Right Column: Storage List -->
      <div class="col-lg-6">
        <div class="mac-card h-100">
          <div class="mac-card-header d-flex justify-content-between w-100">
            <div class="d-flex align-items-center">
              <div class="mac-dots"><span></span><span></span><span></span></div>
              Local Storage History
            </div>
          </div>
          
          <div class="card-body p-4 d-flex flex-column">
            
            <!-- Sync Controls -->
            <div class="d-flex flex-wrap gap-2 mb-4">
              <button class="btn btn-sm btn-outline-success flex-grow-1" type="button" onclick="loadUrlList()" id="loadListBtn">
                <i class="bi bi-arrow-clockwise"></i> Local
              </button>
              <button class="btn btn-sm btn-outline-info flex-grow-1" type="button" onclick="loadKV()" id="loadKV2localStgBtn">
                <i class="bi bi-cloud-download"></i> Sync KV
              </button>
              <button class="btn btn-sm btn-outline-danger flex-grow-1" type="button" onclick="clearLocalStorage()" id="clearlocalStgBtn">
                <i class="bi bi-trash"></i> Clear
              </button>
            </div>

            <!-- List Container (Dynamic render from main.js) -->
            <div id="urlList" class="flex-grow-1" style="overflow-y: auto; overflow-x: hidden;">
              <!-- Javascript injects items here -->
            </div>

          </div>
        </div>
      </div> <!-- End Right Column -->

    </div>
  </div>

  <!-- Footer -->
  <footer>
    <a href="https://github.com/crazypeace/Url-Shorten-Worker/" target="_blank">
      <i class="bi bi-github fs-5 align-middle me-1"></i> Pastebin @ <span id="currentYear"></span>
    </a>
  </footer>

  <!-- Result Modal -->
  <div class="modal fade" id="resultModal" tabindex="-1" role="dialog" aria-labelledby="resultModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content mac-card border-0">
        <div class="mac-card-header">
          <div class="mac-dots"><span></span><span></span><span></span></div>
          System Response
        </div>
        <div class="modal-body text-center py-4">
          <div class="form-control font-monospace text-break fs-6 p-3" id="result" style="color: #d4af37 !important; border-color: rgba(212,175,55,0.4) !important;">No result</div>
        </div>
        <div class="modal-footer justify-content-center border-0 pb-4">
          <button type="button" class="btn btn-gold px-4" onclick='copyurl("result")' data-bs-toggle="popover" data-bs-placement="top" data-bs-content="Copied!">
            <i class="bi bi-clipboard me-1"></i> Copy Link
          </button>
          <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Core Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/gh/lrsjng/jquery-qrcode@0.18.0/dist/jquery-qrcode.min.js" crossorigin="anonymous"></script>

  <!-- Load Origin main.js unchanged -->
  <script src="https://crazypeace.github.io/Url-Shorten-Worker/main.js" crossorigin="anonymous"></script>

  <!-- Extends main.js for Pastebin behavior & UI scripts -->
  <script>
    // 1. Override main.js item builder for Pastebin Textarea Output
    function buildValueTxtarea(longUrl) {
      let valueTxt = document.createElement('textarea');
      valueTxt.classList.add("form-control");
      // Prevent browser default text spellcheck in code/paste
      valueTxt.setAttribute("spellcheck", "false"); 
      valueTxt.innerText = longUrl;
      // Readonly until user clicks inside, avoiding accidental keystrokes
      valueTxt.readOnly = true;
      valueTxt.ondblclick = function() { this.readOnly = false; };
      return valueTxt;
    }
    // Bind to the variable declared in main.js
    buildValueItemFunc = buildValueTxtarea;

    // 2. Theme & Password UI Logic
    const initTheme = () => {
      const saved = localStorage.getItem('royal_theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeIcon(theme);
    };

    const toggleTheme = () => {
      const current = document.documentElement.getAttribute('data-theme');
      const target = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', target);
      localStorage.setItem('royal_theme', target);
      updateThemeIcon(target);
    };

    const updateThemeIcon = (theme) => {
      const icon = document.getElementById('theme-icon');
      if(theme === 'dark') {
        icon.className = 'bi bi-sun-fill text-warning';
      } else {
        icon.className = 'bi bi-moon-stars-fill';
      }
    };

    const togglePassword = () => {
      const pwd = document.getElementById('passwordText');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    };

    // 3. Dynamic Footer Year
    document.getElementById('currentYear').textContent = new Date().getFullYear();

    // Init Theme on Load
    initTheme();
  </script>
</body>
</html>
